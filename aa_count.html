        updateSyncBadge();
        document.getElementById('totalCount').textContent = allItems.length;

        try {

          if (cached) {
            allItems = JSON.parse(cached);

            renderCategoryTabs();
            renderItems();
            document.getElementById('totalCount').textContent = allItems.length;

          }

  function renderCategoryTabs() {
    var container = document.getElementById('categoryTabs');

  function getStorageKey() {
    var site = document.getElementById('siteSelect').value;

    try {

    loadValues();

          });

        // If both zero but user explicitly set 0
        if (mainVal === 0 && cretVal === 0 && (countValues[item.sku + '_main'] !== undefined || countValues[item.sku + '_cret'] !== undefined)) {
          // skip zeros unless user typed them
        }
      } else {

      countValues = {};
      renderItems();
    })
    .catch(function(err) {
      showLoading(false);
      document.getElementById('submitBtn').disabled = false;
      toast('❌ Submit failed: ' + err.message, 'error');
      console.error(err);
    });
  });

  // Site change re-renders
  document.getElementById('siteSelect').addEventListener('change', function() {
    loadValues();
    renderItems();
  });
  document.getElementById('dateSelect').addEventListener('change', function() {

  fetchItems();
